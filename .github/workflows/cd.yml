name: CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # OIDC 토큰 발급 필요
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,AWS_REGION
          script: |
            # ECR 로그인 (EC2 IAM Role 사용)
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            cd /opt/howread

            # 최신 이미지 Pull 후 앱 컨테이너만 재시작 (nginx 재시작 없음)
            ECR_REGISTRY=${{ secrets.ECR_REGISTRY }} \
            ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }} \
            docker compose -f docker-compose.prod.yml pull app

            ECR_REGISTRY=${{ secrets.ECR_REGISTRY }} \
            ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }} \
            docker compose -f docker-compose.prod.yml up -d --no-deps app

            # 사용하지 않는 구 이미지 정리
            docker image prune -f

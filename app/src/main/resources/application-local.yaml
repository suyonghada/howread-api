spring:
  datasource:
    url: jdbc:h2:mem:howread;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false  # 로컬은 H2 + ddl-auto로 스키마 관리, Flyway는 prod에서만 사용

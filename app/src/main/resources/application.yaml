spring:
  application:
    name: howread-backend
  profiles:
    active: local
  jpa:
    open-in-view: false   # OSIV 비활성화: 커넥션을 뷰 렌더링까지 유지하면 커넥션 고갈 위험
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 21600    # 6시간 (초)
  refresh-token-expiry: 604800  # 7일 (초)

aws:
  region: ${AWS_REGION}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  s3:
    bucket: ${AWS_S3_BUCKET}
  cloudfront:
    domain: ${AWS_CLOUDFRONT_DOMAIN}

kakao:
  api:
    key: ${KAKAO_REST_API_KEY}
    book-search-url: https://dapi.kakao.com/v3/search/book

spring:
  datasource:
    url: jdbc:h2:mem:howread;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

jwt:
  secret: test-secret-key-must-be-at-least-256bits-long-for-hs256
  access-token-expiry: 3600
  refresh-token-expiry: 86400

aws:
  region: ap-northeast-2
  access-key-id: ''
  secret-access-key: ''
  s3:
    bucket: test-bucket
  cloudfront:
    domain: test.cloudfront.net

kakao:
  api:
    key: test-kakao-key
    book-search-url: http://localhost:8080/mock/kakao
